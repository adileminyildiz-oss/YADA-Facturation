<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Abonnement — AEM-CONSEIL</title>
<meta name="description" content="Offres d'abonnement — Espace AEM-CONSEIL.">
<meta name="theme-color" content="#04050b">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" sizes="512x512" href="../assets/favicon-512.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* Verrou d'accès : réservé aux comptes connectés et approuvés. */
(function(){
  try{
    var root=document.documentElement; root.style.visibility='hidden';
    function reveal(){ root.style.visibility=''; }
    function bounce(){ location.replace('../'); }
    if(!window.supabase){ reveal(); return; }
    var sb=window.supabase.createClient('https://ammmyhtxnwyoopfxtans.supabase.co','sb_publishable_VBYOMpnF3kv7kkcrMLczZQ_v2e4_RHo',{auth:{persistSession:true,autoRefreshToken:true}});
    sb.auth.getSession().then(function(r){
      if(!(r&&r.data&&r.data.session)){ bounce(); return; }
      sb.rpc('is_approved').then(function(p){ if(p&&!p.error&&p.data!==true){ bounce(); } else { reveal(); } }).catch(reveal);
    }).catch(reveal);
  }catch(e){ try{document.documentElement.style.visibility='';}catch(_){} }
})();
</script>
<style>
  :root{
    --noir:#04050b; --noir2:#070912; --noir3:#0b0e1a;
    --outremer:#2b45ff; --azur:#6d86ff; --peri:#a9b8ff; --gold:#ffcf6d;
    --line:rgba(150,168,255,.11); --line-2:rgba(150,168,255,.18);
    --glass:rgba(255,255,255,.035); --glass-2:rgba(255,255,255,.06);
    --txt:#f2f4ff; --txt2:#8b98bd; --pos:#3ee9a4;
  }
  *{box-sizing:border-box;margin:0}
  html,body{height:100%}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--txt);background:var(--noir);-webkit-font-smoothing:antialiased;line-height:1.5;
    min-height:100vh;min-height:100dvh}
  button{font-family:inherit}

  .topbar{display:flex;align-items:center;gap:14px;padding:12px clamp(14px,3vw,26px);border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,rgba(12,16,30,.9),rgba(7,9,18,.7))}
  .topbar .brand{display:flex;align-items:center;gap:12px}
  .topbar .brand img{height:30px;filter:brightness(1.14) drop-shadow(0 0 8px rgba(169,184,255,.4))}
  .topbar .brand .t{font-family:'Inter Tight';font-weight:700;font-size:16px;line-height:1.1}
  .topbar .brand .t small{display:block;font-weight:500;font-size:11px;color:var(--txt2)}
  body.embed .topbar{display:none}

  .wrap{max-width:1080px;margin:0 auto;padding:30px clamp(14px,3vw,26px) 50px}
  .hero{text-align:center;margin-bottom:30px}
  .hero .badge{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--gold);background:rgba(255,207,109,.1);border:1px solid rgba(255,207,109,.28);padding:4px 13px;border-radius:999px;margin-bottom:14px}
  .hero h1{font-family:'Inter Tight';font-weight:700;font-size:28px;letter-spacing:-.02em}
  .hero p{color:var(--txt2);font-size:14.5px;margin-top:8px}
  .current{display:inline-flex;align-items:center;gap:8px;margin-top:16px;font-size:13px;color:var(--txt2);background:var(--glass);border:1px solid var(--line-2);padding:7px 14px;border-radius:999px}
  .current b{color:var(--txt)}

  .plans{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;align-items:stretch}
  @media(max-width:820px){.plans{grid-template-columns:1fr;max-width:400px;margin:0 auto}}
  .plan{position:relative;display:flex;flex-direction:column;background:var(--noir2);border:1px solid var(--line-2);border-radius:18px;padding:22px 20px;transition:.18s}
  .plan:hover{transform:translateY(-3px);border-color:var(--azur)}
  .plan.featured{border-color:rgba(255,207,109,.4);box-shadow:0 20px 50px rgba(0,0,0,.4)}
  .plan.featured::before{content:'Recommandé';position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#241a04;background:linear-gradient(135deg,var(--gold),#ffb347);padding:3px 12px;border-radius:999px}
  .plan .pname{font-family:'Inter Tight';font-weight:700;font-size:17px}
  .plan .ptag{font-size:12px;color:var(--txt2);margin-top:2px;min-height:32px}
  .plan .price{margin:14px 0 4px;font-family:'Inter Tight';font-weight:700;font-size:32px;letter-spacing:-.02em}
  .plan .price span{font-size:13px;font-weight:500;color:var(--txt2)}
  .plan ul{list-style:none;margin:16px 0;display:flex;flex-direction:column;gap:9px;flex:1}
  .plan li{display:flex;align-items:flex-start;gap:9px;font-size:13px;color:var(--txt)}
  .plan li.off{color:var(--txt2);opacity:.6}
  .plan li .ci{width:18px;height:18px;flex:none;border-radius:5px;display:grid;place-items:center;margin-top:1px;background:rgba(62,233,164,.13);border:1px solid rgba(62,233,164,.3);color:var(--pos)}
  .plan li.off .ci{background:var(--glass);border:1px solid var(--line);color:var(--txt2)}
  .plan li .ci svg{width:11px;height:11px}
  .choose{margin-top:auto;padding:12px;border:none;border-radius:12px;font-family:'Inter Tight';font-weight:600;font-size:14px;cursor:pointer;background:var(--glass-2);border:1px solid var(--line-2);color:var(--txt);transition:.15s;text-align:center;display:block}
  .choose:hover{background:rgba(109,134,255,.16)}
  .plan.featured .choose{background:linear-gradient(135deg,var(--gold),#ffb347);color:#241a04;border:none}
  .plan.current-plan .choose{background:rgba(62,233,164,.12);border:1px solid rgba(62,233,164,.3);color:var(--pos);cursor:default;pointer-events:none}
  .plan .curtag{position:absolute;top:14px;right:14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--pos);background:rgba(62,233,164,.12);border:1px solid rgba(62,233,164,.3);padding:2px 8px;border-radius:999px}

  .note{display:flex;gap:11px;max-width:760px;margin:26px auto 0;padding:14px 16px;border-radius:13px;background:rgba(109,134,255,.06);border:1px solid var(--line-2);font-size:13px;color:var(--txt2);line-height:1.6}
  .note svg{width:18px;height:18px;flex:none;color:var(--peri);margin-top:1px}
  .note b{color:var(--txt)}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(16px);z-index:200;background:var(--noir3);border:1px solid var(--line-2);color:var(--txt);padding:11px 18px;border-radius:11px;font-size:13px;box-shadow:0 16px 40px rgba(0,0,0,.5);opacity:0;visibility:hidden;transition:.24s;display:flex;align-items:center;gap:9px}
  .toast.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}
  .toast .d{width:7px;height:7px;border-radius:50%;background:var(--pos)}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand"><img src="../assets/logo-full.png" alt="AEM CONSEIL"><span class="t">Abonnement<small>AEM CONSEIL</small></span></div>
  </div>
  <div class="wrap">
    <div class="hero">
      <span class="badge">Nos offres</span>
      <h1>Choisissez votre formule</h1>
      <p>Des outils de facturation qui évoluent avec votre activité.</p>
      <div class="current" id="current" hidden><span>Votre offre actuelle :</span> <b id="curName">—</b></div>
    </div>
    <div class="plans" id="plans"></div>
    <div class="note"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg><span>Le paiement en ligne sera bientôt disponible. En attendant, cliquez sur <b>Choisir</b> pour envoyer votre demande : l'équipe AEM-CONSEIL active votre offre.</span></div>
  </div>
  <div class="toast" id="toast"><span class="d"></span><span id="toastMsg"></span></div>

<script>
  if(/[?&]embed=1/.test(location.search)) document.body.classList.add('embed');
  var SUPABASE_URL='https://ammmyhtxnwyoopfxtans.supabase.co', SUPABASE_KEY='sb_publishable_VBYOMpnF3kv7kkcrMLczZQ_v2e4_RHo';
  var CONTACT='contact@aemconseil.eu';
  var sb=null; try{ if(window.supabase) sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{persistSession:true,autoRefreshToken:true}}); }catch(e){}

  var PLANS=[
    {id:'essentiel', name:'Essentiel', price:'14,99', tag:'Pour facturer vos ventes au quotidien.',
     features:[['Factures de vente illimitées',1],['Aperçu A4 & export PDF',1],['Numérotation automatique par client',1],['Sauvegarde de vos documents',1],['Facturation électronique (Factur-X)',0],['Envois clients & relances',0]]},
    {id:'pro', name:'Pro', price:'44,99', tag:'La facturation électronique conforme à la réforme.', featured:true,
     features:[['Tout de l\'offre Essentiel',1],['Facturation électronique (Factur-X)',1],['Émission & réception EN 16931',1],['Contrôle de conformité',1],['Prêt pour le raccordement PDP',1],['Envois clients & relances',0]]},
    {id:'premium', name:'Premium', price:'149,99', tag:'La gestion client complète, envois et relances.',
     features:[['Tout de l\'offre Pro',1],['Dossiers clients (Mes documents)',1],['Envois des factures aux clients',1],['Relances par e-mail automatiques',1],['Suivi des règlements',1],['Support prioritaire',1]]}
  ];
  var PLAN_NAMES={free:'Aucune',essentiel:'Essentiel',pro:'Pro',premium:'Premium'};
  var currentPlan='free', isAdmin=false;

  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function toast(m){ var t=document.getElementById('toast'); document.getElementById('toastMsg').textContent=m; t.classList.add('show'); clearTimeout(toast._t); toast._t=setTimeout(function(){t.classList.remove('show');},2800); }

  function render(){
    document.getElementById('plans').innerHTML=PLANS.map(function(p){
      var isCur = !isAdmin && currentPlan===p.id;
      var li=p.features.map(function(f){
        return '<li class="'+(f[1]?'':'off')+'"><span class="ci">'+(f[1]
          ?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>'
          :'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>')+'</span>'+esc(f[0])+'</li>';
      }).join('');
      var btn = isCur ? '<span class="choose">Votre offre</span>'
        : '<button class="choose" data-plan="'+p.id+'">Choisir '+esc(p.name)+'</button>';
      return '<div class="plan'+(p.featured?' featured':'')+(isCur?' current-plan':'')+'">'+
        (isCur?'<span class="curtag">Actuelle</span>':'')+
        '<div class="pname">'+esc(p.name)+'</div><div class="ptag">'+esc(p.tag)+'</div>'+
        '<div class="price">'+p.price+' €<span> /mois</span></div>'+
        '<ul>'+li+'</ul>'+btn+'</div>';
    }).join('');
    var cur=document.getElementById('current');
    if(isAdmin){ cur.hidden=false; document.getElementById('curName').textContent='Accès complet (administrateur)'; }
    else if(currentPlan && currentPlan!=='free'){ cur.hidden=false; document.getElementById('curName').textContent=PLAN_NAMES[currentPlan]; }
    else { cur.hidden=false; document.getElementById('curName').textContent='Aucune offre active'; }
  }

  document.getElementById('plans').addEventListener('click', function(e){
    var b=e.target.closest('[data-plan]'); if(!b) return;
    var p=PLANS.filter(function(x){return x.id===b.dataset.plan;})[0]; if(!p) return;
    var subject=encodeURIComponent('Demande d\'abonnement — offre '+p.name);
    var body=encodeURIComponent('Bonjour,\n\nJe souhaite souscrire à l\'offre '+p.name+' ('+p.price+' € / mois).\n\nMerci.');
    window.open('mailto:'+CONTACT+'?subject='+subject+'&body='+body, '_blank');
    toast('Votre demande pour l\'offre '+p.name+' est prête à être envoyée.');
  });

  (async function(){
    if(sb){ try{ var r=await sb.rpc('my_access'); if(r&&!r.error&&r.data){ isAdmin=r.data.admin===true; currentPlan=r.data.plan||'free'; } }catch(e){} }
    render();
  })();
</script>
</body>
</html>
