<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Espace — AEM-CONSEIL</title>
<meta name="description" content="Espace en ligne AEM-CONSEIL.">
<meta name="theme-color" content="#04050b">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" sizes="512x512" href="assets/favicon-512.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/favicon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --noir:#04050b; --noir2:#070912; --noir3:#0b0e1a;
    --outremer:#2b45ff; --azur:#6d86ff; --peri:#a9b8ff;
    --line:rgba(150,168,255,.11); --line-2:rgba(150,168,255,.18);
    --glass:rgba(255,255,255,.035); --glass-2:rgba(255,255,255,.06);
    --txt:#f2f4ff; --txt2:#8b98bd; --pos:#3ee9a4;
    --sidebar:224px;
  }
  *{box-sizing:border-box;margin:0}
  html,body{height:100%}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--txt);background:var(--noir);-webkit-font-smoothing:antialiased;line-height:1.5;overflow:hidden}
  a{color:inherit;text-decoration:none}
  .app{display:flex;height:100vh;height:100dvh}

  .sidebar{width:var(--sidebar);flex:none;display:flex;flex-direction:column;border-right:1px solid var(--line);
    background:linear-gradient(180deg,rgba(11,14,26,.9),rgba(5,7,14,.94));z-index:70}
  .sb-logo{display:flex;align-items:center;gap:12px;padding:18px 16px;border-bottom:1px solid var(--line);overflow:hidden}
  .sb-logo img{height:38px;filter:brightness(1.14) drop-shadow(0 0 8px rgba(169,184,255,.4))}
  .sb-logo .t{font-family:'Inter Tight';font-weight:700;font-size:17px;line-height:1.12}
  .sb-logo .t small{display:block;font-weight:500;font-size:12px;letter-spacing:.02em;color:var(--txt2);white-space:nowrap}
  .sb-section{padding:14px 13px 5px;font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:#5a6488;font-weight:600}
  .snav{display:flex;flex-direction:column;gap:4px;padding:0 10px;overflow-y:auto}
  .snav .item{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:11px;font-family:'Inter Tight';font-weight:600;font-size:13.5px;
    color:var(--txt2);cursor:pointer;border:1px solid transparent;background:none;width:100%;text-align:left;transition:.16s;position:relative}
  .snav .item .ic{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;flex:none;background:var(--glass);border:1px solid var(--line);color:var(--peri);transition:.16s}
  .snav .item .ic svg{width:16px;height:16px}
  .snav .item .lbl{flex:1;min-width:0;display:flex;flex-direction:column;line-height:1.18}
  .snav .item .lbl .l2{font-size:10.5px;font-weight:400;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .snav .item:hover{background:var(--glass);border-color:var(--line);color:#fff}
  .snav .item:hover .l2{color:var(--peri)}
  .snav .item.active{background:var(--glass-2);border-color:var(--line-2);color:#fff;box-shadow:inset 3px 0 0 0 var(--azur)}
  .snav .item.active .l2{color:var(--peri)}
  .snav .item.active .ic{background:linear-gradient(135deg,rgba(109,134,255,.3),rgba(43,69,255,.26));border-color:var(--line-2);color:#fff;box-shadow:0 4px 14px rgba(43,69,255,.22)}
  .snav .item .pill{font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:2px 7px;border-radius:999px;background:rgba(109,134,255,.12);border:1px solid var(--line-2);color:var(--peri);flex:none}
  .sb-foot{margin-top:auto;padding:10px;border-top:1px solid var(--line)}
  .sb-foot .item{display:flex;align-items:center;gap:10px;width:100%;padding:8px 10px;border-radius:9px;border:none;background:none;
    font-family:'Inter Tight';font-weight:500;font-size:13px;color:var(--txt2);text-align:left;cursor:pointer;transition:.16s}
  .sb-foot .item:hover{background:var(--glass);color:#fff}
  .sb-foot .item .ic{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;flex:none;background:var(--glass);border:1px solid var(--line);color:var(--txt2);transition:.16s}
  .sb-foot .item .ic svg{width:14px;height:14px}
  .sb-foot .logout{color:#ff9a9a;font-weight:600}
  .sb-foot .logout .ic{background:rgba(255,92,92,.09);border-color:rgba(255,92,92,.22);color:#ff9a9a}
  .sb-foot .logout:hover{background:rgba(255,92,92,.1);color:#ffb3b3}
  .sb-foot .logout:hover .ic{background:rgba(255,92,92,.18);border-color:rgba(255,92,92,.32);color:#ffb3b3}

  .main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--noir)}
  .mtop{display:none;align-items:center;gap:12px;padding:11px 15px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(12,16,30,.9),rgba(7,9,18,.8))}
  .burger{width:38px;height:38px;flex:none;display:grid;place-items:center;border-radius:10px;background:var(--glass);border:1px solid var(--line-2);color:var(--txt);cursor:pointer}
  .burger svg{width:19px;height:19px}
  .mtop .mt-title{font-family:'Inter Tight';font-weight:600;font-size:14px}
  .mtop img{margin-left:auto;height:22px;filter:brightness(1.14)}
  .frame-wrap{flex:1;position:relative;min-height:0}
  iframe.module{width:100%;height:100%;border:0;display:block;background:var(--noir)}
  .frame-load{position:absolute;inset:0;display:grid;place-items:center;background:var(--noir);transition:opacity .4s,visibility .4s;z-index:2}
  .frame-load.hide{opacity:0;visibility:hidden}
  .sp{width:32px;height:32px;border-radius:50%;border:3px solid var(--line-2);border-top-color:var(--azur);animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .frame-empty{position:absolute;inset:0;display:grid;place-items:center;background:var(--noir);padding:24px;z-index:1}
  .frame-empty[hidden]{display:none}
  .frame-empty .fe{text-align:center;max-width:420px}
  .frame-empty .fe-ic{width:60px;height:60px;margin:0 auto 16px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,rgba(109,134,255,.24),rgba(43,69,255,.2));border:1px solid var(--line-2);color:var(--peri)}
  .frame-empty .fe-ic svg{width:28px;height:28px}
  .frame-empty .fe-badge{display:inline-block;margin-bottom:13px;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--peri);background:rgba(109,134,255,.12);border:1px solid var(--line-2);padding:4px 12px;border-radius:999px}
  .frame-empty h2{font-family:'Inter Tight';font-weight:600;font-size:21px;margin-bottom:9px}
  .frame-empty p{color:var(--txt2);font-size:14px;line-height:1.55}

  .ov{position:fixed;inset:0;z-index:65;background:rgba(0,0,0,.6);backdrop-filter:blur(2px);opacity:0;visibility:hidden;transition:.28s}
  .ov.open{opacity:1;visibility:visible}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(16px);z-index:200;background:var(--noir3);border:1px solid var(--line-2);color:var(--txt);
    padding:11px 18px;border-radius:11px;font-size:13px;box-shadow:0 16px 40px rgba(0,0,0,.5);opacity:0;visibility:hidden;transition:.24s;display:flex;align-items:center;gap:9px}
  .toast.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}
  .toast .d{width:7px;height:7px;border-radius:50%;background:var(--peri)}

  .app[hidden]{display:none}
  /* Auth gate */
  .authgate{position:fixed;inset:0;z-index:120;display:grid;place-items:center;padding:24px;overflow:auto;
    background:radial-gradient(1100px 560px at 50% -12%,rgba(43,69,255,.18),transparent),var(--noir)}
  .authgate[hidden]{display:none}
  .authcard{width:100%;max-width:384px;background:linear-gradient(180deg,rgba(11,14,26,.92),rgba(5,7,14,.95));
    border:1px solid var(--line-2);border-radius:18px;padding:28px 26px;box-shadow:0 30px 80px rgba(0,0,0,.55)}
  .authcard .brand{display:flex;align-items:center;gap:11px;margin-bottom:6px}
  .authcard .brand img{height:28px;filter:brightness(1.14) drop-shadow(0 0 8px rgba(169,184,255,.4))}
  .authcard .brand .t{font-family:'Inter Tight';font-weight:600;font-size:15px;line-height:1.1}
  .authcard .brand .t small{display:block;font-weight:400;font-size:10.5px;color:var(--txt2)}
  .authcard .lead{font-size:12.5px;color:var(--txt2);margin:0 0 18px;line-height:1.5}
  .authtabs{display:flex;gap:4px;padding:4px;background:var(--glass);border:1px solid var(--line);border-radius:11px;margin-bottom:6px}
  .authtabs button{flex:1;padding:8px;border:none;background:none;color:var(--txt2);font-family:'Inter Tight';font-weight:600;font-size:13px;border-radius:8px;cursor:pointer;transition:.16s}
  .authtabs button.active{background:var(--glass-2);color:#fff;box-shadow:inset 0 0 0 1px var(--line-2)}
  .authcard label{display:block;font-size:10.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--txt2);margin:15px 0 6px}
  .authcard input{width:100%;padding:11px 13px;background:var(--noir2);border:1px solid var(--line-2);border-radius:10px;color:var(--txt);font-size:14px;font-family:inherit;transition:.16s}
  .authcard input:focus{outline:none;border-color:var(--azur);box-shadow:0 0 0 3px rgba(109,134,255,.18)}
  .authcard .submit{width:100%;margin-top:20px;padding:12px;border:none;border-radius:11px;background:linear-gradient(135deg,var(--outremer),var(--azur));color:#fff;font-family:'Inter Tight';font-weight:600;font-size:14px;cursor:pointer;transition:.16s}
  .authcard .submit:hover{filter:brightness(1.08)}
  .authcard .submit:disabled{opacity:.55;cursor:default}
  .authmsg{margin-top:14px;font-size:12.5px;line-height:1.5;padding:10px 12px;border-radius:10px;display:none}
  .authmsg.err{display:block;background:rgba(255,90,90,.1);border:1px solid rgba(255,90,90,.32);color:#ff9a9a}
  .authmsg.ok{display:block;background:rgba(62,233,164,.09);border:1px solid rgba(62,233,164,.28);color:var(--pos)}

  .sb-user{display:flex;align-items:center;gap:9px;padding:8px 10px;margin-bottom:6px;border-radius:9px;background:var(--glass);border:1px solid var(--line)}
  .sb-user[hidden]{display:none}
  .sb-user .av{width:28px;height:28px;flex:none;border-radius:8px;display:grid;place-items:center;background:linear-gradient(135deg,var(--outremer),var(--azur));color:#fff;font-weight:700;font-size:12px;font-family:'Inter Tight';text-transform:uppercase}
  .sb-user .uinfo{display:flex;flex-direction:column;min-width:0}
  .sb-user .ue{font-size:11.5px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sb-user .ur{font-size:10px;color:var(--txt2)}

  @media(max-width:820px){
    .sidebar{position:fixed;top:0;left:0;height:100dvh;transform:translateX(-100%);transition:transform .3s cubic-bezier(.22,1,.36,1);box-shadow:0 0 60px rgba(0,0,0,.6)}
    .sidebar.open{transform:none}
    .mtop{display:flex}
  }
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div class="authgate" id="authGate" hidden>
  <form class="authcard" id="authForm" autocomplete="on" novalidate>
    <div class="brand"><img src="assets/logo-full.png" alt="AEM CONSEIL"><span class="t">Espace<small>AEM-CONSEIL</small></span></div>
    <p class="lead" id="authLead">Connectez-vous pour accéder à votre espace.</p>
    <div class="authtabs" id="authTabs">
      <button type="button" data-mode="login" class="active">Se connecter</button>
      <button type="button" data-mode="signup">Créer un compte</button>
    </div>
    <label for="authEmail">Adresse e-mail</label>
    <input id="authEmail" type="email" required autocomplete="email" placeholder="vous@exemple.fr">
    <label for="authPass">Mot de passe</label>
    <input id="authPass" type="password" required autocomplete="current-password" minlength="6" placeholder="••••••••">
    <button class="submit" type="submit" id="authSubmit">Se connecter</button>
    <div class="authmsg" id="authMsg" role="status"></div>
  </form>
</div>
<div class="app" hidden>
  <aside class="sidebar" id="sidebar">
    <div class="sb-logo">
      <img src="assets/logo-full.png" alt="AEM CONSEIL">
      <span class="t">Espace<small>AEM CONSEIL</small></span>
    </div>
    <div class="sb-section">Modules</div>
    <nav class="snav" id="snav" aria-label="Modules">
      <button class="item" data-module="facturation">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg></span>
        <span class="lbl"><span class="l1">Facturation</span><span class="l2">Factures &amp; devis</span></span>
      </button>
      <button class="item" data-module="efacture">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="m9 15 2 2 4-4"/></svg></span>
        <span class="lbl"><span class="l1">Facturation électronique</span><span class="l2">Factur-X · émission &amp; réception</span></span>
      </button>
      <button class="item" data-module="documents">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg></span>
        <span class="lbl"><span class="l1">Mes documents</span><span class="l2">Dossiers clients</span></span>
      </button>
      <button class="item" data-module="admin" id="admItem" hidden>
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
        <span class="lbl"><span class="l1">Administration</span><span class="l2">Utilisateurs &amp; accès</span></span>
      </button>
    </nav>
    <div class="sb-foot">
      <div class="sb-user" id="sbUser" hidden>
        <span class="av" id="userAv">A</span>
        <span class="uinfo"><span class="ue" id="userEmail"></span><span class="ur">Connecté</span></span>
      </div>
      <button class="item logout" type="button" id="logoutBtn" hidden>
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg></span>
        <span class="lbl">Déconnexion</span>
      </button>
      <a class="item" href="https://aemconseil.eu/">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></span>
        <span class="lbl">Retour au site</span>
      </a>
    </div>
  </aside>

  <div class="main">
    <div class="mtop">
      <button class="burger" type="button" aria-label="Menu" onclick="toggleNav(true)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>
      <span class="mt-title" id="mtTitle">Facturation</span>
      <img src="assets/logo-full.png" alt="AEM CONSEIL">
    </div>
    <div class="frame-wrap">
      <div class="frame-load" id="frameLoad"><span class="sp"></span></div>
      <div class="frame-empty" id="frameEmpty" hidden>
        <div class="fe">
          <div class="fe-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8v4l3 2"/><circle cx="12" cy="12" r="9"/></svg></div>
          <span class="fe-badge">En préparation</span>
          <h2 id="feTitle">Module</h2>
          <p id="feDesc">Ce module arrive prochainement dans votre espace.</p>
        </div>
      </div>
      <iframe class="module" id="moduleFrame" title="Module" src="about:blank"></iframe>
    </div>
  </div>
</div>
<div class="ov" id="ov" onclick="toggleNav(false)"></div>
<div class="toast" id="toast"><span class="d"></span><span id="toastMsg"></span></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  /* ---- Authentification (Supabase) ---- */
  var SUPABASE_URL='https://ammmyhtxnwyoopfxtans.supabase.co';
  var SUPABASE_KEY='sb_publishable_VBYOMpnF3kv7kkcrMLczZQ_v2e4_RHo';
  var sb=null, authMode='login', authReady=false;
  try{ if(window.supabase){ sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}}); } }catch(e){}

  var elGate=document.getElementById('authGate'), elApp=document.querySelector('.app');
  function authMsg(kind,text){ var m=document.getElementById('authMsg'); if(!text){ m.className='authmsg'; m.textContent=''; return; } m.className='authmsg '+kind; m.textContent=text; }
  function setAuthMode(mode){
    authMode=mode;
    document.querySelectorAll('#authTabs button').forEach(function(b){ b.classList.toggle('active', b.dataset.mode===mode); });
    document.getElementById('authSubmit').textContent = mode==='signup' ? 'Créer mon compte' : 'Se connecter';
    document.getElementById('authLead').textContent = mode==='signup' ? 'Créez votre compte pour accéder à votre espace.' : 'Connectez-vous pour accéder à votre espace.';
    document.getElementById('authPass').setAttribute('autocomplete', mode==='signup' ? 'new-password' : 'current-password');
    authMsg();
  }
  function showApp(session){
    elGate.hidden=true; elApp.hidden=false;
    var em = session && session.user ? (session.user.email||'') : '';
    document.getElementById('userEmail').textContent=em;
    document.getElementById('userAv').textContent=(em.charAt(0)||'A');
    document.getElementById('sbUser').hidden=false;
    document.getElementById('logoutBtn').hidden=false;
    if(!showApp._routed){ showApp._routed=true; route(); }
    checkAdmin();
  }
  function showGate(){
    elApp.hidden=true; elGate.hidden=false;
    document.getElementById('sbUser').hidden=true;
    document.getElementById('logoutBtn').hidden=true;
    IS_ADMIN=false; document.getElementById('admItem').hidden=true;
  }
  function checkAdmin(){
    if(!sb){ return; }
    sb.rpc('is_admin').then(function(r){
      IS_ADMIN = !r.error && r.data===true;
      document.getElementById('admItem').hidden = !IS_ADMIN;
    }).catch(function(){ IS_ADMIN=false; document.getElementById('admItem').hidden=true; });
  }
  document.getElementById('authTabs').addEventListener('click', function(e){ var b=e.target.closest('button'); if(b) setAuthMode(b.dataset.mode); });
  document.getElementById('authForm').addEventListener('submit', async function(e){
    e.preventDefault();
    if(!sb){ authMsg('err',"Service d'authentification indisponible. Réessayez plus tard."); return; }
    var email=document.getElementById('authEmail').value.trim();
    var pass=document.getElementById('authPass').value;
    if(!email || pass.length<6){ authMsg('err','Renseignez un e-mail valide et un mot de passe d’au moins 6 caractères.'); return; }
    var btn=document.getElementById('authSubmit'); btn.disabled=true; authMsg();
    try{
      if(authMode==='signup'){
        btn.textContent='Création…';
        var r=await sb.auth.signUp({email:email,password:pass});
        if(r.error) throw r.error;
        if(r.data && r.data.session){ /* onAuthStateChange gère l’ouverture */ }
        else { authMsg('ok','Compte créé. Vérifiez votre boîte mail pour confirmer votre adresse, puis connectez-vous.'); setAuthMode('login'); }
      } else {
        btn.textContent='Connexion…';
        var r2=await sb.auth.signInWithPassword({email:email,password:pass});
        if(r2.error) throw r2.error;
      }
    }catch(err){
      var msg=(err&&err.message)||'Une erreur est survenue.';
      if(/invalid login credentials/i.test(msg)) msg='E-mail ou mot de passe incorrect.';
      else if(/already registered|already exists/i.test(msg)) msg='Un compte existe déjà avec cet e-mail. Connectez-vous.';
      else if(/email not confirmed/i.test(msg)) msg='Adresse non confirmée. Vérifiez votre boîte mail.';
      authMsg('err',msg);
    }finally{ btn.disabled=false; btn.textContent = authMode==='signup' ? 'Créer mon compte' : 'Se connecter'; }
  });
  document.getElementById('logoutBtn').addEventListener('click', async function(){ if(sb){ await sb.auth.signOut(); } showGate(); });

  async function initAuth(){
    if(!sb){ showGate(); authMsg('err',"Service d'authentification indisponible. Vérifiez votre connexion et réessayez."); return; }
    try{
      var res=await sb.auth.getSession();
      if(res.data && res.data.session){ showApp(res.data.session); } else { showGate(); }
    }catch(e){ showGate(); }
    sb.auth.onAuthStateChange(function(_evt,session){ if(session){ authMsg(); showApp(session); } else { showGate(); } });
    authReady=true;
  }

  var MODULES = {
    facturation: { title:'Facturation', url:'facturation/?embed=1', enabled:true },
    efacture:    { title:'Facturation électronique', url:'efacture/?embed=1', enabled:true },
    documents:   { title:'Mes documents', url:'documents/?embed=1', enabled:true },
    admin:       { title:'Administration', url:'admin/?embed=1', enabled:true, admin:true }
  };
  var DEFAULT='facturation', current=null, IS_ADMIN=false;
  var frame=document.getElementById('moduleFrame'), frameLoad=document.getElementById('frameLoad');
  function currentKey(){ var h=(location.hash||'').replace(/^#/,''); var ok=MODULES[h]&&MODULES[h].enabled&&(!MODULES[h].admin||IS_ADMIN); return ok?h:DEFAULT; }
  function route(){
    var key=currentKey(), mod=MODULES[key];
    document.querySelectorAll('.snav .item').forEach(function(b){ b.classList.toggle('active', b.dataset.module===key); });
    document.getElementById('mtTitle').textContent=mod.title;
    document.title=mod.title+' — Espace AEM-CONSEIL';
    var empty=document.getElementById('frameEmpty');
    if(mod.url){
      empty.hidden=true; frame.style.display='';
      if(key!==current){ current=key; frameLoad.classList.remove('hide'); frame.src=mod.url; }
    } else {
      current=key; frameLoad.classList.add('hide'); frame.style.display='none';
      document.getElementById('feTitle').textContent=mod.title;
      document.getElementById('feDesc').textContent=mod.desc||'Bientôt disponible.';
      empty.hidden=false;
    }
    toggleNav(false);
  }
  frame.addEventListener('load', function(){ if(frame.src && !frame.src.endsWith('about:blank')) frameLoad.classList.add('hide'); });
  document.getElementById('snav').addEventListener('click', function(e){
    var b=e.target.closest('.item'); if(!b) return;
    var key=b.dataset.module;
    if(('#'+key)!==location.hash){ location.hash=key; } else { route(); }
  });
  function toggleNav(open){ document.getElementById('sidebar').classList.toggle('open',open); document.getElementById('ov').classList.toggle('open',open); }
  var toastTimer=null;
  function toast(m){ var t=document.getElementById('toast'); document.getElementById('toastMsg').textContent=m; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(function(){t.classList.remove('show');},2200); }
  window.addEventListener('message', function(e){
    var d=e.data; if(!d||d.type!=='aem-nav'||!d.module) return;
    if(MODULES[d.module]&&MODULES[d.module].enabled){ if(('#'+d.module)!==location.hash){ location.hash=d.module; } else { route(); } }
  });
  window.addEventListener('hashchange', route);
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') toggleNav(false); });
  initAuth();
</script>
</body>
</html>
