<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Espace — AEM-CONSEIL</title>
<meta name="description" content="Espace en ligne AEM-CONSEIL.">
<meta name="theme-color" content="#04050b">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" sizes="512x512" href="assets/favicon-512.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/favicon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --noir:#04050b; --noir2:#070912; --noir3:#0b0e1a;
    --outremer:#2b45ff; --azur:#6d86ff; --peri:#a9b8ff;
    --line:rgba(150,168,255,.11); --line-2:rgba(150,168,255,.18);
    --glass:rgba(255,255,255,.035); --glass-2:rgba(255,255,255,.06);
    --txt:#f2f4ff; --txt2:#8b98bd; --pos:#3ee9a4;
    --sidebar:210px;
  }
  *{box-sizing:border-box;margin:0}
  html,body{height:100%}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--txt);background:var(--noir);-webkit-font-smoothing:antialiased;line-height:1.5;overflow:hidden}
  a{color:inherit;text-decoration:none}
  .app{display:flex;height:100vh;height:100dvh}

  .sidebar{width:var(--sidebar);flex:none;display:flex;flex-direction:column;border-right:1px solid var(--line);
    background:linear-gradient(180deg,rgba(11,14,26,.9),rgba(5,7,14,.94));z-index:70}
  .sb-logo{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line)}
  .sb-logo img{height:24px;filter:brightness(1.14) drop-shadow(0 0 8px rgba(169,184,255,.4))}
  .sb-logo .t{font-family:'Inter Tight';font-weight:600;font-size:13px;line-height:1.1}
  .sb-logo .t small{display:block;font-weight:400;font-size:10px;color:var(--txt2)}
  .sb-section{padding:14px 13px 5px;font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:#5a6488;font-weight:600}
  .snav{display:flex;flex-direction:column;gap:3px;padding:0 10px;overflow-y:auto}
  .snav .item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;font-family:'Inter Tight';font-weight:500;font-size:13px;
    color:var(--txt2);cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:.16s;position:relative}
  .snav .item .ic{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;flex:none;background:var(--glass);border:1px solid var(--line);color:var(--peri)}
  .snav .item .ic svg{width:14px;height:14px}
  .snav .item .lbl{flex:1;min-width:0}
  .snav .item:hover{background:var(--glass);color:#fff}
  .snav .item.active{background:var(--glass-2);color:#fff;box-shadow:inset 3px 0 0 0 var(--azur)}
  .snav .item.active .ic{background:linear-gradient(135deg,rgba(109,134,255,.28),rgba(43,69,255,.24));border-color:var(--line-2);color:#fff}
  .snav .item .pill{font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:2px 7px;border-radius:999px;background:rgba(109,134,255,.12);border:1px solid var(--line-2);color:var(--peri);flex:none}
  .sb-foot{margin-top:auto;padding:10px;border-top:1px solid var(--line)}
  .sb-foot .item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;font-family:'Inter Tight';font-weight:500;font-size:13px;color:var(--txt2);transition:.16s}
  .sb-foot .item:hover{background:var(--glass);color:#fff}
  .sb-foot .item .ic{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;flex:none;background:var(--glass);border:1px solid var(--line);color:var(--txt2)}
  .sb-foot .item .ic svg{width:14px;height:14px}

  .main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--noir)}
  .mtop{display:none;align-items:center;gap:12px;padding:11px 15px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(12,16,30,.9),rgba(7,9,18,.8))}
  .burger{width:38px;height:38px;flex:none;display:grid;place-items:center;border-radius:10px;background:var(--glass);border:1px solid var(--line-2);color:var(--txt);cursor:pointer}
  .burger svg{width:19px;height:19px}
  .mtop .mt-title{font-family:'Inter Tight';font-weight:600;font-size:14px}
  .mtop img{margin-left:auto;height:22px;filter:brightness(1.14)}
  .frame-wrap{flex:1;position:relative;min-height:0}
  iframe.module{width:100%;height:100%;border:0;display:block;background:var(--noir)}
  .frame-load{position:absolute;inset:0;display:grid;place-items:center;background:var(--noir);transition:opacity .4s,visibility .4s;z-index:2}
  .frame-load.hide{opacity:0;visibility:hidden}
  .sp{width:32px;height:32px;border-radius:50%;border:3px solid var(--line-2);border-top-color:var(--azur);animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .frame-empty{position:absolute;inset:0;display:grid;place-items:center;background:var(--noir);padding:24px;z-index:1}
  .frame-empty[hidden]{display:none}
  .frame-empty .fe{text-align:center;max-width:420px}
  .frame-empty .fe-ic{width:60px;height:60px;margin:0 auto 16px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,rgba(109,134,255,.24),rgba(43,69,255,.2));border:1px solid var(--line-2);color:var(--peri)}
  .frame-empty .fe-ic svg{width:28px;height:28px}
  .frame-empty .fe-badge{display:inline-block;margin-bottom:13px;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--peri);background:rgba(109,134,255,.12);border:1px solid var(--line-2);padding:4px 12px;border-radius:999px}
  .frame-empty h2{font-family:'Inter Tight';font-weight:600;font-size:21px;margin-bottom:9px}
  .frame-empty p{color:var(--txt2);font-size:14px;line-height:1.55}

  .ov{position:fixed;inset:0;z-index:65;background:rgba(0,0,0,.6);backdrop-filter:blur(2px);opacity:0;visibility:hidden;transition:.28s}
  .ov.open{opacity:1;visibility:visible}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(16px);z-index:200;background:var(--noir3);border:1px solid var(--line-2);color:var(--txt);
    padding:11px 18px;border-radius:11px;font-size:13px;box-shadow:0 16px 40px rgba(0,0,0,.5);opacity:0;visibility:hidden;transition:.24s;display:flex;align-items:center;gap:9px}
  .toast.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}
  .toast .d{width:7px;height:7px;border-radius:50%;background:var(--peri)}

  @media(max-width:820px){
    .sidebar{position:fixed;top:0;left:0;height:100dvh;transform:translateX(-100%);transition:transform .3s cubic-bezier(.22,1,.36,1);box-shadow:0 0 60px rgba(0,0,0,.6)}
    .sidebar.open{transform:none}
    .mtop{display:flex}
  }
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sb-logo">
      <img src="assets/logo-full.png" alt="AEM CONSEIL">
      <span class="t">Espace<small>AEM-CONSEIL</small></span>
    </div>
    <div class="sb-section">Modules</div>
    <nav class="snav" id="snav" aria-label="Modules">
      <button class="item" data-module="facturation">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg></span>
        <span class="lbl">Facturation</span>
      </button>
      <button class="item" data-module="documents">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><path d="M13 2v7h7M9 13h6M9 17h6"/></svg></span>
        <span class="lbl">Mes documents</span>
      </button>
    </nav>
    <div class="sb-foot">
      <a class="item" href="https://aemconseil.eu/">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></span>
        <span class="lbl">Retour au site</span>
      </a>
    </div>
  </aside>

  <div class="main">
    <div class="mtop">
      <button class="burger" type="button" aria-label="Menu" onclick="toggleNav(true)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>
      <span class="mt-title" id="mtTitle">Facturation</span>
      <img src="assets/logo-full.png" alt="AEM CONSEIL">
    </div>
    <div class="frame-wrap">
      <div class="frame-load" id="frameLoad"><span class="sp"></span></div>
      <div class="frame-empty" id="frameEmpty" hidden>
        <div class="fe">
          <div class="fe-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8v4l3 2"/><circle cx="12" cy="12" r="9"/></svg></div>
          <span class="fe-badge">En préparation</span>
          <h2 id="feTitle">Module</h2>
          <p id="feDesc">Ce module arrive prochainement dans votre espace.</p>
        </div>
      </div>
      <iframe class="module" id="moduleFrame" title="Module" src="about:blank"></iframe>
    </div>
  </div>
</div>
<div class="ov" id="ov" onclick="toggleNav(false)"></div>
<div class="toast" id="toast"><span class="d"></span><span id="toastMsg"></span></div>

<script>
  var MODULES = {
    facturation: { title:'Facturation', url:'facturation/?embed=1', enabled:true },
    documents:   { title:'Mes documents', enabled:true, desc:'Consultez et téléchargez vos documents. Bientôt disponible.' }
  };
  var DEFAULT='facturation', current=null;
  var frame=document.getElementById('moduleFrame'), frameLoad=document.getElementById('frameLoad');
  function currentKey(){ var h=(location.hash||'').replace(/^#/,''); return (MODULES[h]&&MODULES[h].enabled)?h:DEFAULT; }
  function route(){
    var key=currentKey(), mod=MODULES[key];
    document.querySelectorAll('.snav .item').forEach(function(b){ b.classList.toggle('active', b.dataset.module===key); });
    document.getElementById('mtTitle').textContent=mod.title;
    document.title=mod.title+' — Espace AEM-CONSEIL';
    var empty=document.getElementById('frameEmpty');
    if(mod.url){
      empty.hidden=true; frame.style.display='';
      if(key!==current){ current=key; frameLoad.classList.remove('hide'); frame.src=mod.url; }
    } else {
      current=key; frameLoad.classList.add('hide'); frame.style.display='none';
      document.getElementById('feTitle').textContent=mod.title;
      document.getElementById('feDesc').textContent=mod.desc||'Bientôt disponible.';
      empty.hidden=false;
    }
    toggleNav(false);
  }
  frame.addEventListener('load', function(){ if(frame.src && !frame.src.endsWith('about:blank')) frameLoad.classList.add('hide'); });
  document.getElementById('snav').addEventListener('click', function(e){
    var b=e.target.closest('.item'); if(!b) return;
    var key=b.dataset.module;
    if(('#'+key)!==location.hash){ location.hash=key; } else { route(); }
  });
  function toggleNav(open){ document.getElementById('sidebar').classList.toggle('open',open); document.getElementById('ov').classList.toggle('open',open); }
  var toastTimer=null;
  function toast(m){ var t=document.getElementById('toast'); document.getElementById('toastMsg').textContent=m; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(function(){t.classList.remove('show');},2200); }
  window.addEventListener('hashchange', route);
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') toggleNav(false); });
  route();
</script>
</body>
</html>
